<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assay - catch the silently-wrong step, against reality</title>
<style>

  *{box-sizing:border-box}
  html,body{min-height:100%}
  body{margin:0;background:radial-gradient(circle at top,rgba(204,231,214,.8),transparent 32%),linear-gradient(180deg,#f5f7f2 0%,#edf2eb 100%);
    color:var(--text);font:15px/1.5 "IBM Plex Sans","Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;overflow-y:auto}
  button,input,textarea{font:inherit}
  .wrap{width:min(1120px,calc(100% - 32px));margin:0 auto;padding:28px 0 52px}
  .panel,.col,.receipt,.card,.connect,.notice,.task{border:1px solid var(--line);border-radius:24px;background:var(--paper);box-shadow:var(--shadow)}
  .panel,.connect{padding:24px}
  h1,h2,h3{font-family:Georgia,serif;color:var(--text)}
  .runwrap{display:flex;justify-content:flex-end;margin-left:auto}
  .runbtn{display:inline-flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;background:#fff;color:#163726;border:1px solid rgba(20,40,29,.12);
    border-radius:999px;padding:14px 24px;font-size:15px;font-weight:700;box-shadow:0 16px 38px rgba(31,58,40,.10)}
  .runbtn:disabled{opacity:.6;cursor:default}
  .runbtn:hover:not(:disabled){transform:translateY(-1px)}
  .panel{margin-top:18px}
  .section-head{display:flex;justify-content:space-between;gap:18px;align-items:center}
  .section-note,.card .price,.receipt .k,footer{color:var(--muted)}
  .board{margin-top:18px}
  .results{opacity:0;transform:translateY(10px);transition:.5s}
  .results.show{opacity:1;transform:none}
  .receipts{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:14px}
  .receipt{padding:16px}
  .receipt .v{font-size:28px;font-weight:800;margin-top:4px;color:#163726}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
  .card{padding:18px}
  .card.win{border-color:rgba(15,93,53,.22);background:linear-gradient(180deg,#f4faf6,#edf6f0)}
  .card .lbl{font-size:12px;color:#5a7568}
  .card .big{font-size:34px;font-weight:800;margin:5px 0 2px}
  .bar{height:8px;border-radius:999px;background:#e6ede8;margin:12px 0 4px;overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:999px;width:0;transition:width .9s cubic-bezier(.4,1.3,.5,1)}
  .rc>i{background:var(--blue)} .rb>i{background:linear-gradient(90deg,#0f5d35,#4b8d69)} .rs>i{background:#986325}
  .tag2{display:inline-block;font-size:10px;font-weight:700;border-radius:999px;padding:4px 9px;margin-top:7px}
  .tag2.bad{color:var(--red);background:var(--red-soft)} .tag2.good{color:var(--green);background:var(--green-soft)}
  .headline{margin-top:16px;background:#f3f8f4;border:1px solid rgba(15,93,53,.14);border-radius:20px;padding:16px 18px;font-size:16px;font-weight:600;color:#1f3b2d}
  .headline b{color:var(--teal)}
  .notice{margin-top:16px;background:#fff7e7;border:1px solid #f2d28e;padding:14px;color:#845b14;font-size:13px}
  .live-note{margin-top:14px;color:#4f6d5e;font-size:14px;min-height:22px}
  .loading{position:relative;overflow:hidden}
  .loading::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.82),transparent);animation:shimmer 1.1s linear infinite}
  .skeleton-line,.skeleton-pill,.skeleton-value{display:block;border-radius:999px;background:linear-gradient(90deg,#edf3ee,#f9fbfa,#edf3ee);background-size:200% 100%;animation:shimmerBg 1.25s linear infinite}
  .skeleton-line{height:13px;width:68%}
  .skeleton-pill{height:12px;width:44%;margin-top:12px}
  .skeleton-value{height:34px;width:56%;margin-top:12px}
  .card.loading .skeleton-line:first-child{width:44%}
  .card.loading .skeleton-line:last-child{width:62%;margin-top:14px}
  .headline.loading{min-height:84px}
  .headline.loading .skeleton-line{width:90%;margin-top:12px}
  .reveal{animation:riseIn .58s cubic-bezier(.2,.8,.2,1) both}
  @keyframes shimmer{100%{transform:translateX(100%)}}
  @keyframes shimmerBg{0%{background-position:200% 0}100%{background-position:-200% 0}}
  @keyframes riseIn{0%{opacity:0;transform:translateY(22px)}100%{opacity:1;transform:translateY(0)}}
  footer{margin-top:22px;font-size:12px;text-align:center}
  @media(max-width:720px){
    .wrap{width:min(100% - 24px,1120px);padding-top:20px}
    .receipts,.cards{grid-template-columns:1fr}
  }
</style>

  </section>
</div>

  return `<div class="card loading"><span class="skeleton-line"></span><span class="skeleton-value"></span><span class="skeleton-line"></span></div>`;
}
function headlineLoading(){
  return `<div class="headline loading" id="headline"><span class="skeleton-line"></span><span class="skeleton-line"></span></div>`;
}
function scard(sb,key,label,win){
  const cls={cheap:"rc",assay:"rb",strong:"rs"}[key];
  const tag=sb.broken_shipped>0?`<span class="tag2 bad">${sb.broken_shipped} shipped broken</span>`:`<span class="tag2 good">0 broken</span>`;
  return `<div class="card ${win?"win":""}"><div class="lbl">${label}</div><div class="big">${sb.reliability}%</div>
    <div class="price">reliability · <b>$${sb.cost_per_1k_usd}</b>/1k steps</div>
    <div class="bar ${cls}"><i data-w="${sb.reliability}"></i></div>${tag}</div>`;
}
function seedLoading(){
  $("#receipts").innerHTML =
    receiptMarkup("Resolved support tickets") +
    receiptMarkup("Cost vs always using Opus 4.8") +
    receiptMarkup("Tickets escalated to Opus 4.8");
  $("#cards").innerHTML = cardLoading() + cardLoading() + cardLoading();
  $("#headline").outerHTML = headlineLoading();
  $("#results").classList.add("show");
}
async function board(d){
  const sb=d.scoreboard,h=d.headline;
  const receiptHtml = [
    `<div class="receipt reveal"><div class="k">Resolved support tickets</div><div class="v" style="color:var(--teal)">${h.cheap_reliability}% -> ${h.assay_reliability}%</div></div>`,
    `<div class="receipt reveal"><div class="k">Cost vs always using Opus 4.8</div><div class="v" style="color:var(--green)">${h.savings_vs_strong_pct}% cheaper</div></div>`,
    `<div class="receipt reveal"><div class="k">Tickets escalated to Opus 4.8</div><div class="v">only ${h.escalated} / ${h.total_steps} steps</div></div>`
  ];
  const cardHtml = [
    scard(sb.cheap,"cheap","Mistral Small 4 alone"),
    scard(sb.assay,"assay","Mistral Small 4 + verification",true),
    scard(sb.strong,"strong","Opus 4.8 on every ticket")
  ].map(html => html.replace('class="card', 'class="card reveal'));
  const receiptNodes = $("#receipts").children;
  const cardNodes = $("#cards").children;
  const headlineText = `On this support workflow, the verified Mistral Small 4 path reaches <b>${h.assay_reliability}% successful resolutions</b> (vs ${h.cheap_reliability}% for Mistral Small 4 alone), while staying <b>${h.savings_vs_strong_pct}% cheaper than running Opus 4.8 on every ticket</b>.`;
  const liveNote = $("#live-note");
  const setLiveNote = (text) => { if (liveNote) liveNote.textContent = text; };

  const timeline = [
    { delay: 900, run: () => { setLiveNote("Reading ticket..."); } },
    { delay: 1100, run: () => { receiptNodes[0].outerHTML = receiptHtml[0]; setLiveNote("Extracting support data..."); } },
    { delay: 1200, run: () => { receiptNodes[1].outerHTML = receiptHtml[1]; setLiveNote("Verifying policy and response quality..."); } },
    { delay: 1200, run: () => { receiptNodes[2].outerHTML = receiptHtml[2]; setLiveNote("Identifying which tickets require escalation..."); } },
    { delay: 1400, run: () => { cardNodes[0].outerHTML = cardHtml[0]; setLiveNote("Comparing Mistral Small 4 against the verified path..."); } },
    { delay: 1300, run: () => { cardNodes[1].outerHTML = cardHtml[1]; setLiveNote("Calculating cost per support ticket..."); } },
    { delay: 1300, run: () => { cardNodes[2].outerHTML = cardHtml[2]; setLiveNote("Compiling final results..."); } },
    { delay: 1400, run: () => {
      $("#headline").outerHTML = `<div class="headline reveal" id="headline">${headlineText}</div>`;
      document.querySelectorAll(".bar>i").forEach(i=>i.style.width=i.dataset.w+"%");
      setLiveNote("");
    } }
  ];

  for (const item of timeline) {
    await sleep(item.delay);
    item.run();
  }
}
$("#run").addEventListener("click",async()=>{
  const b=$("#run"); b.disabled=true; b.textContent="Running..."; $("#results").classList.remove("show");
  if ($("#live-note")) $("#live-note").textContent = "Initializing support workflow...";
  let d;
  try{ d=await(await fetch("/api/run")).json(); }
  catch(e){ d=PINNED; }            // record-safe: play the pinned run if the server is down
  if(!d||!d.results){ b.disabled=false; b.textContent="Run the agent";
    $("#results").innerHTML='<div class="notice">Start the server first: <code>python3 demo/server.py</code> - or open the static page in /docs.</div>'; $("#results").classList.add("show"); return; }
  seedLoading();
  await sleep(300);
  await board(d);
  b.disabled=false; b.textContent="Run again";
});
</script>
